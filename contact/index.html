    <h1>Contact</h1>

    <form action="mailto:rlysenko@ucsd.edu" method="post" enctype="text/plain">
        <label for="email">
            Email:
            <input type="email" name="email" id="email">
        </label>
        <label for="subject">
            Subject:
            <input name="subject" type="text" id="subject">
        </label>
        <label for="body">
            Message:
            <textarea name="body" id="body" rows="6"></textarea>
        </label>
        <button type="submit">Send</button>
    </form>

</body>
